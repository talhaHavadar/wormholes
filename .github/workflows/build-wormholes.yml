name: build-wormholes
# Build each wormhole as an installer image and publish it to GHCR as
# ghcr.io/<owner>/wormhole-<name>. These images carry the wormhole binary and
# copy it into a mounted directory (see each module's Dockerfile); the
# interstellar gateway then loads it.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  # Discover wormholes: every top-level dir with a Dockerfile.
  discover:
    runs-on: ubuntu-latest
    outputs:
      wormholes: ${{ steps.set.outputs.wormholes }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        run: |
          wormholes=$(find . -mindepth 2 -maxdepth 2 -name Dockerfile -printf '%h\n' \
            | sed 's|^\./||' | sort | jq -R . | jq -cs .)
          echo "wormholes=$wormholes" >> "$GITHUB_OUTPUT"
          echo "Discovered wormholes: $wormholes"
  build:
    needs: discover
    if: needs.discover.outputs.wormholes != '[]'
    strategy:
      fail-fast: false
      matrix:
        wormhole: ${{ fromJSON(needs.discover.outputs.wormholes) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.wormhole }}/go.mod
          cache-dependency-path: ${{ matrix.wormhole }}/go.sum
      - name: Test
        working-directory: ${{ matrix.wormhole }}
        run: |
          go build ./...
          go test ./... -timeout 10m
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.wormhole }}
          platforms: linux/amd64
          push: false
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.wormhole }}
          cache-to: type=gha,mode=max,scope=${{ matrix.wormhole }}
  publish:
    if: github.event_name == 'push' && needs.discover.outputs.wormholes != '[]'
    needs: [discover, build]
    strategy:
      fail-fast: false
      matrix:
        wormhole: ${{ fromJSON(needs.discover.outputs.wormholes) }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/wormhole-${{ matrix.wormhole }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.wormhole }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.wormhole }}
          cache-to: type=gha,mode=max,scope=${{ matrix.wormhole }}
