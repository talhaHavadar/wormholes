name: build-wormholes
# Build each wormhole as an installer image and publish it to GHCR as
# ghcr.io/<owner>/wormhole-<name>. These images carry the wormhole binary and
# copy it into a mounted directory (see each module's Dockerfile); the
# interstellar gateway then loads it.
#
# Release tags are per-wormhole: `<wormhole>@v<semver>` (e.g. testflinger@v0.2.0)
# publishes only that wormhole at that version. Pushes to main keep building
# `:latest` as the tip-of-main integration image.
on:
  push:
    branches: [main]
    tags: ['*@v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {} # manual run: rebuilds every wormhole
permissions:
  contents: read
jobs:
  # Discover which wormholes to build (and on tag pushes, which version to
  # stamp). Tag pushes narrow to a single wormhole. Manual runs and PRs/pushes
  # to main use the change-diff logic.
  discover:
    runs-on: ubuntu-latest
    outputs:
      wormholes: ${{ steps.set.outputs.wormholes }}
      version:   ${{ steps.set.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need history to diff against the base / previous push
      - id: set
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE:   ${{ github.ref_type }}
          REF_NAME:   ${{ github.ref_name }}
          BEFORE:     ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # All wormholes: top-level dirs containing a Dockerfile.
          all=$(find . -mindepth 2 -maxdepth 2 -name Dockerfile -printf '%h\n' \
            | sed 's|^\./||' | sort -u)

          # changed-dirs to build. The empty string is the "build everything"
          # sentinel; "__none__" means "diffed, but no wormhole dir changed".
          changed=""
          version=""
          if [ "$REF_TYPE" = "tag" ]; then
            # Per-wormhole release tag: <wormhole>@v<semver>
            if [[ "$REF_NAME" != *"@v"* ]]; then
              echo "::error::tag '$REF_NAME' does not match <wormhole>@v<semver>"
              exit 1
            fi
            name="${REF_NAME%@v*}"
            version="${REF_NAME#*@v}"
            if ! printf '%s\n' "$all" | grep -qx "$name"; then
              echo "::error::tag '$REF_NAME' names unknown wormhole '$name'"
              echo "known wormholes:"
              printf '  %s\n' $all
              exit 1
            fi
            changed="$name"
            echo "reason: per-wormhole tag -> build only $name @ $version"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "reason: manual -> build all"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            changed=$(git diff --name-only "$PR_BASE_SHA...HEAD" \
              | awk -F/ 'NF>1 {print $1}' | sort -u)
            changed=${changed:-__none__}
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              echo "reason: unknown base (new branch / force-push) -> build all"
            else
              changed=$(git diff --name-only "$BEFORE" "$GITHUB_SHA" \
                | awk -F/ 'NF>1 {print $1}' | sort -u)
              changed=${changed:-__none__}
            fi
          fi

          if [ -z "$changed" ]; then
            selected="$all"                                  # build everything
          else
            selected=$(comm -12 <(printf '%s\n' "$all") <(printf '%s\n' "$changed"))
          fi

          wormholes=$(printf '%s\n' "$selected" | sed '/^$/d' | jq -R . | jq -cs .)
          echo "wormholes=$wormholes" >> "$GITHUB_OUTPUT"
          echo "version=$version"     >> "$GITHUB_OUTPUT"
          echo "all:      $(printf '%s ' $all)"
          echo "changed:  ${changed:-<all>}"
          echo "selected: $wormholes"
          echo "version:  ${version:-<none>}"
  build:
    needs: discover
    if: needs.discover.outputs.wormholes != '[]'
    strategy:
      fail-fast: false
      matrix:
        wormhole: ${{ fromJSON(needs.discover.outputs.wormholes) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.wormhole }}/go.mod
          cache-dependency-path: ${{ matrix.wormhole }}/go.sum
      - name: Test
        working-directory: ${{ matrix.wormhole }}
        run: |
          go build ./...
          go test ./... -timeout 10m
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.wormhole }}
          platforms: linux/amd64
          push: false
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.wormhole }}
          cache-to: type=gha,mode=max,scope=${{ matrix.wormhole }}
  publish:
    if: github.event_name == 'push' && needs.discover.outputs.wormholes != '[]'
    needs: [discover, build]
    strategy:
      fail-fast: false
      matrix:
        wormhole: ${{ fromJSON(needs.discover.outputs.wormholes) }}
    runs-on: ubuntu-latest
    environment: release
    # Serialize publishes per-wormhole so a rapid burst of tag pushes (e.g. a
    # fix-forward release) can't race in GHCR. Different wormholes still
    # publish in parallel.
    concurrency:
      group: publish-${{ matrix.wormhole }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/wormhole-${{ matrix.wormhole }}
          # Tag pushes emit the parsed semver as the primary tag; main pushes
          # keep :latest as the tip-of-main integration image. type=ref/branch
          # stays higher priority than raw so main-branch builds still stamp
          # VERSION=main (unchanged from the previous behavior).
          tags: |
            type=raw,value=${{ needs.discover.outputs.version }},enable=${{ github.ref_type == 'tag' }}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.wormhole }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.wormhole }}
          cache-to: type=gha,mode=max,scope=${{ matrix.wormhole }}
  # Single required status check. Make THIS the required check in branch
  # protection (not the matrix `build` job): it passes when the build matrix
  # succeeded or was legitimately skipped (an empty matrix from a docs-only
  # change), and fails if discovery or any build failed — so a no-op PR never
  # leaves a required check stuck "pending".
  gate:
    if: always()
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on build result
        run: |
          echo "discover=${{ needs.discover.result }} build=${{ needs.build.result }}"
          if [ "${{ needs.discover.result }}" != "success" ]; then
            echo "::error::discover did not succeed (${{ needs.discover.result }})"
            exit 1
          fi
          case "${{ needs.build.result }}" in
            success|skipped) echo "build gate passed"; exit 0 ;;
            *) echo "::error::build result: ${{ needs.build.result }}"; exit 1 ;;
          esac
